name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint / mypy / build (3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: ${{ github.event_name != 'pull_request' }}
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Verify uv.lock is in sync
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format)
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src tests
      - name: Build distributions
        run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: ${{ github.event_name != 'pull_request' }}
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

  riskratchet:
    name: riskratchet (PR regression gate)
    # Skip on master pushes; the baseline lives on master, so a self-check
    # against master is always trivially green and adds nothing.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: ${{ github.event_name != 'pull_request' }}
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Generate coverage.json
        run: uv run pytest --cov=src/riskratchet --cov-branch --cov-report=json:coverage.json -q
      - name: Run riskratchet check (produces PR comment body)
        id: ratchet
        run: |
          set +e
          uv run riskratchet check src \
            --coverage coverage.json \
            --baseline .riskratchet.json \
            --format pr-comment > regressions.md
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upsert PR comment with regression report
        if: steps.ratchet.outputs.status != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `pr-comment` format begins with <!-- riskratchet-report --> so we
          # can find and edit the existing comment instead of spamming a new
          # one on every push.
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- riskratchet-report -->")) | .id' \
            | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${existing}" \
              --field body=@regressions.md > /dev/null
          else
            gh pr comment "${PR_NUMBER}" --body-file regressions.md
          fi
      - name: Fail the job on regressions
        if: steps.ratchet.outputs.status != '0'
        run: |
          echo "::error::riskratchet detected regressions. See PR comment for details."
          exit 1

  top-risk:
    name: top-risk dogfood report (informational)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: ${{ github.event_name != 'pull_request' }}
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Refresh top-risk report
        run: bin/dogfood-top-risk.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: top-risk
          path: |
            docs/top-risk.md
            docs/top-risk.json
          if-no-files-found: error
