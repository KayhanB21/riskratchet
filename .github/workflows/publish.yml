name: publish

on:
  push:
    tags:
      - "v*"

# Trusted Publishing to PyPI via OIDC.
# Configure on PyPI: Project -> Publishing -> Add a pending publisher with
#   Owner: KayhanB21
#   Repository: riskratchet
#   Workflow: publish.yml
#   Environment: pypi
#
# This workflow is dormant until the maintainer flips it on; scripts/publish.sh
# remains the active release path in the meantime.

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Quality gate
        run: |
          uv run ruff check .
          uv run mypy src
          uv run pytest -q
      - name: Build
        run: |
          rm -rf dist
          uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/riskratchet/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
