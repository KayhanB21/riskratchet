name: publish

on:
  push:
    tags:
      - "v*"

# Trusted Publishing to PyPI via OIDC.
# Configure on PyPI: Project -> Publishing -> Add a pending publisher with
#   Owner: KayhanB21
#   Repository: riskratchet
#   Workflow: publish.yml
#   Environment: pypi
#
# This workflow is dormant until the maintainer flips it on; scripts/publish.sh
# remains the active release path in the meantime.

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Quality gate
        run: |
          uv run ruff check .
          uv run mypy src
          uv run pytest -q
      - name: Build
        run: |
          rm -rf dist
          uv build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/riskratchet/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Publish via OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
