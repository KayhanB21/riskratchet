name: publish

on:
  push:
    tags:
      - "v*"

# Trusted Publishing to PyPI via OIDC.
# Publisher configured on PyPI with:
#   Owner: KayhanB21
#   Repository: riskratchet
#   Workflow: publish.yml
#   Environment: pypi

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC identity for build provenance attestation
      attestations: write   # write the attestation to the GitHub attestation store
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run pytest -q
      - name: Build
        run: |
          rm -rf dist
          uv build
      - name: Verify built metadata
        run: |
          python - <<'PY'
          import glob
          import zipfile
          from pathlib import Path

          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          expected = project["version"]
          wheels = glob.glob("dist/riskratchet-*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {wheels!r}")

          with zipfile.ZipFile(wheels[0]) as wheel:
              metadata_name = next(name for name in wheel.namelist() if name.endswith(".dist-info/METADATA"))
              metadata = wheel.read(metadata_name).decode("utf-8")

          if f"Version: {expected}\n" not in metadata:
              raise SystemExit(f"wheel metadata does not contain Version: {expected}")
          logo_url = "https://raw.githubusercontent.com/KayhanB21/riskratchet/master/assets/logo.png"
          if logo_url not in metadata:
              raise SystemExit("wheel README metadata does not contain the absolute logo URL")
          PY
      - name: Wheel smoke test (isolated venv)
        run: |
          expected=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          python -m venv /tmp/wheel-env
          /tmp/wheel-env/bin/pip install --upgrade pip
          /tmp/wheel-env/bin/pip install dist/*.whl
          test "$(/tmp/wheel-env/bin/riskratchet --version)" = "$expected"
          test "$(/tmp/wheel-env/bin/python -c 'import importlib.metadata; print(importlib.metadata.version("riskratchet"))')" = "$expected"
      - name: 'pip install . smoke test (isolated venv)'
        run: |
          expected=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          python -m venv /tmp/src-env
          /tmp/src-env/bin/pip install --upgrade pip
          /tmp/src-env/bin/pip install .
          test "$(/tmp/src-env/bin/riskratchet --version)" = "$expected"
      - name: SARIF output validates against schema
        run: |
          /tmp/wheel-env/bin/pip install check-jsonschema
          /tmp/wheel-env/bin/riskratchet scan src --format sarif \
            --no-auto-cov \
            --output /tmp/report.sarif
          /tmp/wheel-env/bin/check-jsonschema \
            --schemafile https://json.schemastore.org/sarif-2.1.0.json \
            /tmp/report.sarif
      - name: Generate CycloneDX SBOM
        run: |
          # Build the SBOM from the *declared* runtime dependency closure
          # (uv.lock minus dev deps), with riskratchet as the root component.
          # Scanning an installed venv would wrongly list pip and venv seed
          # packages as dependencies, so export the locked requirements instead.
          # Emit outside dist/ so the publish job's packages-dir stays
          # distribution-only (gh-action-pypi-publish rejects non-dist files).
          version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          mkdir -p sbom
          uv export --no-dev --no-emit-project --frozen --format requirements-txt > sbom/requirements.txt
          uvx --from cyclonedx-bom cyclonedx-py requirements sbom/requirements.txt \
            --pyproject pyproject.toml \
            --output-format JSON \
            --output-reproducible \
            --output-file "sbom/riskratchet-${version}.cdx.json"
          rm -f sbom/requirements.txt
          test -s "sbom/riskratchet-${version}.cdx.json"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/riskratchet/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish via OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # PEP 740 attestations are already ON BY DEFAULT under Trusted
          # Publishing; set explicitly so the requirement is visible and survives
          # a future default change. (The build-provenance attestation in the
          # build job is the genuinely new control.) The downloaded dist/ holds
          # only the wheel + sdist — the SBOM ships as a separate "sbom" artifact
          # — so packages-dir stays distribution-only.
          attestations: true
