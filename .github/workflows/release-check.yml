name: release-check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-check:
    name: build + install smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Quality gate
        run: |
          uv run ruff check .
          uv run mypy src
          uv run pytest -q
      - name: Build distributions
        run: |
          rm -rf dist
          uv build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - name: Wheel smoke test (isolated venv)
        run: |
          python -m venv /tmp/wheel-env
          /tmp/wheel-env/bin/pip install --upgrade pip
          /tmp/wheel-env/bin/pip install dist/*.whl
          /tmp/wheel-env/bin/riskratchet --version

      - name: 'pip install . smoke test (isolated venv)'
        run: |
          python -m venv /tmp/src-env
          /tmp/src-env/bin/pip install --upgrade pip
          /tmp/src-env/bin/pip install .
          /tmp/src-env/bin/riskratchet --version

      - name: SARIF output validates against schema
        run: |
          /tmp/wheel-env/bin/pip install check-jsonschema
          /tmp/wheel-env/bin/riskratchet scan src --format sarif \
            --output /tmp/report.sarif
          /tmp/wheel-env/bin/check-jsonschema \
            --schemafile https://json.schemastore.org/sarif-2.1.0.json \
            /tmp/report.sarif
