name: release-check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-check:
    name: build + install smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Quality gate
        run: |
          uv run ruff check .
          uv run mypy src
          uv run pytest -q
      - name: Build distributions
        run: |
          rm -rf dist
          uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - name: Wheel smoke test (isolated venv)
        run: |
          python -m venv /tmp/wheel-env
          /tmp/wheel-env/bin/pip install --upgrade pip
          /tmp/wheel-env/bin/pip install dist/*.whl
          /tmp/wheel-env/bin/riskratchet --version

      - name: 'pip install . smoke test (isolated venv)'
        run: |
          python -m venv /tmp/src-env
          /tmp/src-env/bin/pip install --upgrade pip
          /tmp/src-env/bin/pip install .
          /tmp/src-env/bin/riskratchet --version

      - name: SARIF output validates against schema
        run: |
          /tmp/wheel-env/bin/pip install check-jsonschema
          /tmp/wheel-env/bin/riskratchet scan src --format sarif \
            --output /tmp/report.sarif
          /tmp/wheel-env/bin/check-jsonschema \
            --schemafile https://json.schemastore.org/sarif-2.1.0.json \
            /tmp/report.sarif
