name: dogfood-action

# Self-test for action.yml: build the in-tree wheel and invoke the local
# composite action against the riskratchet repo itself. Satisfies the P27
# acceptance criterion "CI runs the action against a synthetic PR" without
# requiring a PyPI publish for the version under test.
#
# `comment: false` so the action does not post to PRs while it stabilises;
# flip to `true` after the workflow has stayed green on a few runs.

on:
  pull_request:
    branches:
      - master
  push:
    branches-ignore:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # churn signals need git history

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Build local wheel
        run: |
          set -euo pipefail
          uv build --wheel
          ls -la dist/

      - name: Generate coverage.json
        run: |
          set -euo pipefail
          # --all-extras is load-bearing: without the `typescript` extra the discovery
          # tests skip, leaving src/riskratchet/typescript.py uncovered. The action's
          # `riskratchet check` step would then score its functions as uncovered,
          # baseline-absent "new" functions above the gate threshold and fail. Mirrors
          # ci.yml's regression-gate job and the pre-commit pytest-cov hook.
          uv sync --locked --all-extras --dev
          uv run pytest --cov --cov-branch --cov-report=json:coverage.json -q

      - name: Run riskratchet action against itself
        uses: ./
        with:
          paths: src
          coverage: coverage.json
          baseline: .riskratchet.json
          local-wheel: dist/*.whl
          comment: 'false'
