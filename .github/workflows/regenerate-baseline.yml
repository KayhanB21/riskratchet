name: regenerate-baseline

# Regenerate .riskratchet.json IN CI, then open a PR with the result.
#
# Why this exists: risk scores depend on environment-sensitive inputs — churn
# uses a wall-clock `git log --since` window, and some functions' coverage
# depends on the filesystem (e.g. doctor.py::_find_newer_py compares file
# mtimes). A baseline regenerated locally (especially on macOS) therefore
# diverges from what the Linux regression gate recomputes, and trips it. This
# workflow regenerates the baseline in the SAME environment the gate runs in, so
# the committed baseline is the gate's fixed point. Always refresh the full
# baseline here rather than running `riskratchet baseline` locally.
#
# Trigger manually: Actions tab -> regenerate-baseline -> Run workflow.

on:
  workflow_dispatch:

permissions:
  contents: write  # push the regen branch; the maintainer opens the PR from the printed link

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # full history for churn signals
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        # --all-extras so the typescript discovery tests run and typescript.py
        # gets honest coverage (parity with the regression gate).
        run: uv sync --all-extras --dev
      - name: Generate coverage.json
        run: uv run pytest --cov=src/riskratchet/ --cov-branch --cov-report=json:coverage.json -q
      - name: Regenerate baseline
        run: uv run riskratchet baseline src --coverage coverage.json --output .riskratchet.json
      - name: Show diff in job summary
        if: always()
        run: |
          {
            echo '### Baseline diff'
            echo '```diff'
            git --no-pager diff -- .riskratchet.json || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload regenerated baseline (fallback)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: riskratchet-baseline
          path: .riskratchet.json
      - name: Push branch and link to a PR
        # Push the regenerated baseline to a branch and print the PR-compare link
        # in the job summary. We deliberately do NOT call `gh pr create`: many orgs
        # disable "Allow GitHub Actions to create and approve pull requests", and a
        # GITHUB_TOKEN-opened PR wouldn't trigger the CI gates anyway. Opening the
        # PR from the printed link uses the maintainer's identity, so the
        # regression gate runs normally and validates the CI-generated baseline.
        run: |
          set -euo pipefail
          if git diff --quiet -- .riskratchet.json; then
            echo "Baseline unchanged — nothing to do." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          branch="chore/regen-baseline-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add .riskratchet.json
          # [riskratchet-baseline-bypass] satisfies the baseline-rationale gate: a
          # CI regen IS the canonical baseline, there is no human bump to justify.
          git commit -m "chore: regenerate riskratchet baseline (CI) [riskratchet-baseline-bypass]"
          git push origin "$branch"
          url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/master...${branch}?expand=1"
          {
            echo "### Baseline regenerated"
            echo ""
            echo "Pushed branch \`${branch}\`. Open the PR (under your identity, so CI runs):"
            echo ""
            echo "${url}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed ${branch}; open: ${url}"
