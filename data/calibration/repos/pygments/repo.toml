name = "pygments"
url = "https://github.com/pygments/pygments"
paths = ["pygments"]
pr_branch = "master"
python = "3.12"
extras = []
# tests/contrast/test_contrasts.py imports this; not a package dep.
test_deps = ["wcag_contrast_ratio"]
test_command = "pytest tests -q --cov=pygments --cov-branch --cov-report=json:{coverage_out}"
coverage_prefix = "pygments"
# Pinned so the committed defect snapshot is reproducible.
snapshot_sha = "19585c4cb28ebdda84190a36d6b916b7b77c9588"
replay_enabled = true

[timeouts]
install_seconds = 600
test_seconds = 1200
