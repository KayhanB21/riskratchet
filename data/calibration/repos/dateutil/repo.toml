name = "dateutil"
url = "https://github.com/dateutil/dateutil"
paths = ["src/dateutil"]
pr_branch = "master"
python = "3.12"
extras = []
test_deps = ["six", "hypothesis", "freezegun"]
test_command = "pytest tests -q --cov=dateutil --cov-branch --cov-report=json:{coverage_out}"
coverage_prefix = "dateutil"
# Disabled: dormant — zero in-window bug-fixes touching the package.
replay_enabled = false

[timeouts]
install_seconds = 600
test_seconds = 1200
