name = "typer"
url = "https://github.com/fastapi/typer"
paths = ["typer"]
pr_branch = "master"
python = "3.12"
extras = []
test_deps = ["click", "rich", "shellingham"]
test_command = "pytest tests -q --cov=typer --cov-branch --cov-report=json:{coverage_out}"
coverage_prefix = "typer"
# Disabled: suite collection fails (missing optional test deps); not pursued — corpus already at 34.
replay_enabled = false

[timeouts]
install_seconds = 600
test_seconds = 1200
