# Repo-local pre-commit hooks for the riskratchet source tree.
# Downstream users get the published hook via `.pre-commit-hooks.yaml`;
# this file is for working on riskratchet itself.
#
# riskratchet check is intentionally NOT wired as a pre-commit hook here:
# pre-commit stashes unstaged changes before running hooks, which conflicts
# with riskratchet's analysis of the working tree. Run it directly instead:
#   uv run pytest --cov --cov-report=json:coverage.json
#   uv run riskratchet check src --coverage coverage.json --baseline .riskratchet.json
# Or wire it through the pytest plugin (--riskratchet flag).
#
# Usage:
#   uv run pre-commit install         # install into .git/hooks
#   uv run pre-commit run --all-files # one-shot on the whole tree

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (with --fix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

      - id: mypy
        name: mypy --strict (src)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
