# Repo-local pre-commit hooks for the riskratchet source tree.
# Downstream users get the published hook via `.pre-commit-hooks.yaml`;
# this file is for working on riskratchet itself.
#
# riskratchet runs against the stashed (about-to-be-committed) tree: the
# pytest-cov hook regenerates coverage.json inside the same hook chain, so
# both source and coverage reflect the same state.
#
# Usage:
#   uv run pre-commit install         # install into .git/hooks
#   uv run pre-commit run --all-files # one-shot on the whole tree

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Syrupy stores blank lines inside multi-line snapshots as
        # 2-space-indented lines; stripping them breaks deserialization.
        exclude: ^tests/__snapshots__/
      - id: end-of-file-fixer
        exclude: ^tests/__snapshots__/
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (with --fix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

      - id: mypy
        name: mypy --strict (src)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: mypy-tests
        name: mypy (src + tests, mirrors CI)
        entry: uv run mypy src tests
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: pytest-cov
        name: pytest --cov (produces coverage.json for riskratchet)
        entry: uv run pytest --cov=src/riskratchet --cov-branch --cov-report=json:coverage.json -q
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

      - id: riskratchet
        name: riskratchet check (gate on baseline regressions)
        entry: uv run riskratchet check src --coverage coverage.json --baseline .riskratchet.json --no-auto-cov
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
